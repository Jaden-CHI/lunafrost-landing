name: Auto Blog Generator

on:
  schedule:
    - cron: "0 0 * * 1,3,5"
  workflow_dispatch:
    inputs:
      topic:
        description: "블로그 주제 (비워두면 랜덤)"
        required: false
        default: ""
      category:
        description: "카테고리 (AI Tools / App Dev / Content)"
        required: false
        default: "AI Tools"

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install ts-node
        run: npm install -g ts-node typescript

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HIGGSFIELD_API_KEY: ${{ secrets.HIGGSFIELD_API_KEY }}
          HIGGSFIELD_API_SECRET: ${{ secrets.HIGGSFIELD_API_SECRET }}
        run: |
          TOPIC="${{ github.event.inputs.topic }}"
          CATEGORY="${{ github.event.inputs.category }}"
          if [ -n "$TOPIC" ]; then
            npx ts-node --compiler-options '{"module":"CommonJS"}' scripts/generate-post.ts "$TOPIC" "$CATEGORY"
          else
            npx ts-node --compiler-options '{"module":"CommonJS"}' scripts/generate-post.ts
          fi

      - name: Check for new files
        id: check_files
        run: |
          if git status --porcelain | grep -q "content/blog\|public/blog"; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_files.outputs.has_changes == 'true'
        run: |
          git config user.name "lunafrost-bot"
          git config user.email "bot@moonyth.app"
          git add content/blog/ public/blog/
          NEW_FILE=$(git diff --cached --name-only | grep "content/blog/" | head -1)
          TITLE=$(grep "^title:" "$NEW_FILE" 2>/dev/null | sed 's/title: "//' | sed 's/"//' || echo "새 블로그 글")
          git commit -m "✍️ auto: ${TITLE}"
          git push origin main

      - name: Summary
        if: steps.check_files.outputs.has_changes == 'true'
        run: echo "## ✅ 완료 — https://moonyth.app/blog" >> $GITHUB_STEP_SUMMARY
